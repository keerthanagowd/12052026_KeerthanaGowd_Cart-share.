<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CartShare | Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="app.js"></script>
</head>
<body>
    <div class="container py-4">
        <h2>Room Details</h2>
        <div class="alert alert-success">
            <h4>Room Code: <span id="roomId"></span></h4>
            <p>Room Name: <span id="roomName"></span></p>
            <p>Members: <span id="memberCount"></span></p>
        </div>
        
        <button class="btn btn-danger" onclick="logout()">Logout</button>
        <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('id');
        const rooms = getRooms();
        const room = rooms.find(r => r.id === roomId);
        
        if (room) {
            document.getElementById('roomId').innerText = room.id;
            document.getElementById('roomName').innerText = room.name;
            document.getElementById('memberCount').innerText = room.members.length;
        } else {
            alert('Room not found!');
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
