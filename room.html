<!<!DOCTYPE html>
<html>
<head>
  <title>Room - My Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Room Details</h2>
      <button onclick="location.href='index.html'">Logout</button>
    </div>
    
    <div class="card">
      <h3>Room Code: <span id="roomCode"></span></h3>
      <p>Room Name: My Cart</p>
      <p>Members: <span id="memberCount">1</span></p>
      <p>User: <span id="userName"></span></p>
    </div>

    <h3>Add Item to Cart</h3>
    <div class="add-form">
      <input type="text" id="itemName" placeholder="Item name: Milk, Bread...">
      <input type="number" id="itemPrice" placeholder="Price" min="0">
      <button onclick="addItem()">Add Item</button>
    </div>

    <h3>Cart Items</h3>
    <div id="itemList"></div>

    <div class="total-section">
      <div>Total: ₹<span id="totalAmount">0</span></div>
      <button class="print-btn" onclick="window.print()">Print Receipt</button>
    </div>

    <div class="activity-log">
      <h3>Activity Log</h3>
      <div id="activityLog"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
