<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CartShare | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

  <div class="auth-wrapper d-flex align-items-center justify-content-center">
    <div class="auth-card shadow">
      <div class="text-center mb-4">
        <div class="brand-icon mx-auto mb-3">🛒</div>
        <h2 class="fw-bold mb-0">CartShare</h2>
        <p class="text-muted small">Collaborative shopping made easy</p>
      </div>

      <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">Login</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">Register</button>
        </li>
      </ul>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="login">
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="loginEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="loginPassword" required>
            </div>
            <div id="loginError" class="text-danger mb-2 small"></div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>
        </div>

        <div class="tab-pane fade" id="register">
          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" id="registerName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="registerEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="registerPassword" required>
            </div>
            <div id="registerError" class="text-danger mb-2 small"></div>
            <div id="registerSuccess" class="text-success mb-2 small"></div>
            <button type="submit" class="btn btn-success w-100">Register</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (getCurrentUser()) {
        window.location.href = 'dashboard.html';
      }

      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorBox = document.getElementById('loginError');
        
        const users = getUsers();
        const user = users.find(u => u.email === email && u.password === password);

        if (!user) {
          errorBox.textContent = 'Invalid email or password';
          return;
        }
        
        setCurrentUser(user);
        window.location.href = 'dashboard.html';
      });

      document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('registerName').value;
        const email = document.getElementById('registerEmail').value;
        const password = document.getElementById('registerPassword').value;
        const errorBox = document.getElementById('registerError');
        const successBox = document.getElementById('registerSuccess');

        const users = getUsers();
        if (users.find(u => u.email === email)) {
          errorBox.textContent = 'Email already registered';
          successBox.textContent = '';
          return;
        }

        const newUser = { name, email, password };
        users.push(newUser);
        saveUsers(users);
        
        errorBox.textContent = '';
        successBox.textContent = 'Registration successful! Please login.';
        document.getElementById('registerForm').reset();
      });
    });
  </script>
</body>
  </html>
